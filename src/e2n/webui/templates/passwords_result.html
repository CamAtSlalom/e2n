<!DOCTYPE html>
<html>
<head><title>e2n — Decrypted: {{ title }}</title></head>
<body>
<h1>{{ title }}</h1>
{% if error %}
<p class="error">{{ error }}</p>
<p><a href="javascript:history.back()">← Try again</a></p>
{% else %}
<h2>Decrypted Content</h2>
<pre style="background:#f5f5f5; padding:1em; border:1px solid #ddd; user-select:all; cursor:pointer;" onclick="navigator.clipboard.writeText(this.textContent).then(()=>this.style.border='2px solid green')">{{ decrypted }}</pre>
<p><em>Click the box above to copy to clipboard. This content is shown in your browser only — not stored anywhere.</em></p>
{% endif %}
<p><a href="/passwords/">← Back to Password List</a> · <a href="/">Home</a></p>
</body>
</html>
