<!DOCTYPE html>
<html>
<head><title>e2n — Decrypt: {{ title }}</title></head>
<body>
<h1>Decrypt: {{ title }}</h1>
{% if hint %}<p><strong>Hint:</strong> {{ hint }}</p>{% endif %}
<form method="post" action="/passwords/decrypt/{{ note_id }}">
  <label>Passphrase:</label>
  <input type="password" name="passphrase" required autofocus>
  <button type="submit">Decrypt →</button>
</form>
</body>
</html>
