<!DOCTYPE html>
<html>
<head><title>e2n Wizard - Import</title></head>
<body>
<h1>Step 4: Import to Notion</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<p>Notes extracted. Ready to import into Notion.</p>
<form method="post" action="/wizard/step/4" onsubmit="disableBtn(this)">
  <button type="submit">Start Import →</button>
</form>
<script>function disableBtn(f){var b=f.querySelector('button');b.disabled=true;b.textContent='Importing, please wait...';}</script>
</body>
</html>
