<!DOCTYPE html>
<html>
<head><title>e2n Wizard - Import</title></head>
<body>
<h1>Step 4: Import to Notion</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<p>Notes extracted. Ready to import into Notion.</p>
<form method="post" action="/wizard/step/4" id="import-form">
  <button type="submit" id="import-btn" onclick="startImport()">Start Import →</button>
</form>
<p id="import-status" style="display:none; font-style:italic;">Importing, please wait...</p>
<script>
function startImport() {
  document.getElementById('import-btn').disabled = true;
  document.getElementById('import-btn').textContent = 'Importing, please wait...';
  document.getElementById('import-status').style.display = 'block';
}
</script>
</body>
</html>
