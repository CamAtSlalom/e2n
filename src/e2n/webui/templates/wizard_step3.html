<!DOCTYPE html>
<html>
<head><title>e2n Wizard - Extract</title></head>
<body>
<h1>Step 3: Extract Notes</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<p>Ready to extract notes from your ENEX source.</p>
<form method="post" action="/wizard/step/3" onsubmit="disableBtn(this)">
  <button type="submit">Start Extraction →</button>
</form>
<script>function disableBtn(f){var b=f.querySelector('button');b.disabled=true;b.textContent='Extracting, please wait...';}</script>
</body>
</html>
