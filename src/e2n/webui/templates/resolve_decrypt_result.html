<!DOCTYPE html>
<html>
<head><title>e2n - Decrypt Result</title></head>
<body>
<h1>Decrypt Result: {{ note_id }}</h1>

{% if error %}
<p class="error">{{ error }}</p>
<p><a href="/resolve/decrypt/{{ note_id }}">← Try again</a></p>
{% else %}
<h2>Decrypted Content</h2>
<pre style="background:#f5f5f5; padding:1em; border:1px solid #ddd; user-select:all; cursor:pointer;" onclick="navigator.clipboard.writeText(this.textContent).then(()=>this.style.border='2px solid green')">{{ decrypted }}</pre>
<p><em>Click the box above to copy. This content is shown in your browser only — not stored anywhere.</em></p>

<h3>What would you like to do?</h3>
<form method="post" action="/resolve/decrypt-import/{{ note_id }}" style="display:inline; margin-right:1em;" onsubmit="this.querySelector('button').disabled=true;this.querySelector('button').textContent='Importing...';">
  <input type="hidden" name="passphrase" value="{{ passphrase }}">
  <input type="hidden" name="block_id" value="{{ block_id }}">
  <input type="hidden" name="page_id" value="{{ page_id }}">
  <button type="submit" onclick="return confirm('⚠️ This content will be visible to anyone with workspace access. Notion does not support encryption. Continue?')">
    Permanently decrypt in Notion
  </button>
</form>
<form method="post" action="/resolve/acknowledge/{{ note_id }}" style="display:inline" onsubmit="this.querySelector('button').disabled=true;this.querySelector('button').textContent='Deleting...';">
  <button type="submit" onclick="return confirm('This will permanently delete the encrypted block from Notion. Cannot undo.')">
    Delete block from Notion
  </button>
</form>
{% endif %}

<p><a href="/resolve/">← Back to Workbench</a> · <a href="/" style="display:inline-block; padding:0.3em 0.8em; background:#555; color:#fff; border-radius:4px; text-decoration:none; font-size:0.85em;">Home</a></p>
</body>
</html>
