<!DOCTYPE html>
<html>
<head><title>e2n - Resolve: {{ reason }}</title></head>
<body>
<h1>{{ reason }} Exceptions</h1>
<p>{{ exceptions | length }} item(s)</p>
<table>
  <thead><tr><th>Note</th><th>Title</th><th>Link Text</th><th>Link Value</th></tr></thead>
  <tbody>
  {% for exc in exceptions %}
    <tr>
      <td>{{ exc.note_id }}</td>
      <td>{{ exc.title }}</td>
      <td>{{ exc.link_text }}</td>
      <td>{{ exc.link_value }}</td>
    </tr>
  {% endfor %}
  </tbody>
</table>
<p><a href="/resolve/">← Back to dashboard</a></p>
</body>
</html>
