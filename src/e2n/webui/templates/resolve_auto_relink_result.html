<!DOCTYPE html>
<html>
<head><title>e2n - Auto-Relink Results</title></head>
<body>
<h1>Auto-Relink Results</h1>
{% if error %}
<p class="error">{{ error }}</p>
{% else %}
<p>Resolved: {{ resolved }} | Skipped (manual review): {{ skipped }}</p>
<table>
  <thead><tr><th>Note</th><th>Link Text</th><th>Status</th><th>Reason</th></tr></thead>
  <tbody>
  {% for r in results %}
    <tr>
      <td>{{ r.title }}</td>
      <td>{{ r.link_text }}</td>
      <td>{{ r.status }}</td>
      <td>{{ r.reason }}</td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% endif %}
<p><a href="/resolve/">← Back to dashboard</a></p>
</body>
</html>
